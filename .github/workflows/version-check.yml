name: Version sync

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive fork version from git describe
        run: |
          desc=$(git describe --tags --long HEAD)
          tag=$(echo "$desc" | sed -E 's/^v?([0-9]+\.[0-9]+\.[0-9]+)-.*/\1/')
          count=$(echo "$desc" | sed -E 's/^v?[0-9]+\.[0-9]+\.[0-9]+-([0-9]+)-g.*/\1/')

          expected="${tag}.${count}"
          current=$(grep -oP 'ofgwrite_version\[\] = "\K[^"]+' ofgwrite.c)

          echo "Git describe: $desc"
          echo "Expected version: $expected"
          echo "Current version:  $current"

          if [ "$current" = "$expected" ]; then
            echo "Version already correct."
            exit 0
          fi

          sed -i "s/ofgwrite_version\[\] = \"[^\"]*\"/ofgwrite_version[] = \"$expected\"/" ofgwrite.c
          echo "Updated version: $current -> $expected"
          echo "VERSION_CHANGED=true" >> "$GITHUB_ENV"
          echo "NEW_VERSION=$expected" >> "$GITHUB_ENV"

      - name: Commit version update
        if: env.VERSION_CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ofgwrite.c
          git commit -m "chore: sync fork version to ${{ env.NEW_VERSION }} [skip ci]"
          git push
